version: '3.8'

services:
  # 1. DATABASE LAYER (PostgreSQL)
  postgres:
    image: postgres:16
    container_name: drone_dashboard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drone_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. BACKEND LAYER (FastAPI Python Application)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drone_dashboard_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - database_url=postgresql://postgres:postgres@postgres:5432/drone_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/data
  # 3. FRONTEND LAYER (Angular Web Application)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drone_dashboard_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
