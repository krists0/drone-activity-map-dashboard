<div class="pipeline-container">
  <h3>⚙️ Ingestion Pipeline Status</h3>

  <div class="action-buttons">
    <button class="btn-run-pipeline" (click)="runPipeline()">
      🚀 Run Ingestion Pipeline
    </button>
  </div>

  <table class="runs-table" *ngIf="pipelineRuns.length > 0">
    <thead>
      <tr>
        <th>Date</th>
        <th>Status</th>
        <th>Valid</th>
        <th>Invalid</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let run of pipelineRuns">
        <td>{{ run.started_at | date:'short' }}</td>
        <td><span class="status-badge" [class]="run.status">{{ run.status }}</span></td>
        <td class="success-txt">{{ run.valid_records }}</td>
        <td class="fail-txt">{{ run.invalid_records }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="pipelineRuns.length === 0" class="empty-state">No runs yet.</p>
</div>
