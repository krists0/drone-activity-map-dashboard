<div class="filter-container">
  <h3>🔍 Filter Panel</h3>

  <!-- 1. Drone Type Selection -->
  <div class="filter-field">
    <label>Drone Type:</label>
    <select [(ngModel)]="localFilters.drone_type">
      <option value="">All Types</option>
      <option value="Quadcopter">Quadcopter</option>
      <option value="Fixed Wing">Fixed Wing</option>
      <option value="VTOL">VTOL</option>
    </select>
  </div>

  <!-- 2. Status Selection (FIXED values to lowercase to match JSON data keys) -->
  <div class="filter-field">
    <label>Status:</label>
    <select [(ngModel)]="localFilters.status">
      <option value="">All Statuses</option>
      <option value="active">Active</option>
      <option value="landed">Landed</option>
      <option value="lost_signal">Lost Signal</option>
    </select>
  </div>

  <!-- 3. Operator ID Input -->
  <div class="filter-field">
    <label>Operator ID:</label>
    <input type="text" [(ngModel)]="localFilters.operator_id" placeholder="e.g. OP-123">
  </div>

  <!-- 4. Minimum Battery Number Input -->
  <div class="filter-field">
    <label>Min Battery (%):</label>
    <input type="number" min="0" max="100" [(ngModel)]="localFilters.min_battery" placeholder="0-100">
  </div>

  <!-- 5. From Date Selection -->
  <div class="filter-field">
    <label>From Date:</label>
    <input type="date" [(ngModel)]="localFilters.from_date">
  </div>

  <!-- 6. To Date Selection -->
  <div class="filter-field">
    <label>To Date:</label>
    <input type="date" [(ngModel)]="localFilters.to_date">
  </div>

  <!-- Action Buttons Section -->
  <div class="action-buttons">
    <button class="btn-apply" (click)="applyFilters()">Apply Filters</button>
    <button class="btn-reset" (click)="resetFilters()">Clear Filters</button>
  </div>
</div>
